headersOrigin = "config"
plugins = []

[functions]

  [functions."*"]

[build]
# Ne jamais sauter le build côté Netlify : code de sortie ≠ 0 → le déploiement part (toutes les étapes s’enchaînent).
# (Code 0 sur cette commande = « annuler le build » selon la doc Netlify.)
ignore = "exit 1"
publish = "."
publishOrigin = "config"

  [build.environment]
  # L'URL Supabase est déjà exposée au client (anon) ; NETLIFY en a aussi une copie en env pour les fonctions.
  # Sans ça, le build échoue car la même chaîne apparaît dans config.js / CSP.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  # Cloudflare Web Analytics + PayPal SDK/checkout + Supabase + jsDelivr + Google Fonts
  Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://static.cloudflareinsights.com https://cdn.jsdelivr.net https://www.paypal.com https://www.paypalobjects.com https://c.paypal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cloudflareinsights.com https://www.paypal.com https://api.paypal.com https://api.sandbox.paypal.com https://c.paypal.com https://*.paypal.com; frame-src https://www.paypal.com https://c.paypal.com https://*.paypal.com; form-action 'self' https://www.paypal.com https://*.paypal.com"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.js"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.png"

  [headers.values]
  Cache-Control = "public, max-age=86400"

[[redirects]]
from = "/stand"
to = "/stand.html"
status = 200