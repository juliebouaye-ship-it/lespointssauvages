headersOrigin = "config"
plugins = []

[functions]

  [functions."*"]

[build]
# Ne jamais sauter le build côté Netlify : code de sortie ≠ 0 → le déploiement part (toutes les étapes s’enchaînent).
# (Code 0 sur cette commande = « annuler le build » selon la doc Netlify.)
ignore = "exit 1"
publish = "."
publishOrigin = "config"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.js"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.png"

  [headers.values]
  Cache-Control = "public, max-age=86400"

[[redirects]]
from = "/stand"
to = "/stand.html"
status = 200