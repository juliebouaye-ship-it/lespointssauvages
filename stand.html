<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Les Points Rebelles | Dashboard stand</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="./logolps.png?v=4" />
    <link rel="icon" type="image/png" sizes="192x192" href="./logolps.png?v=4" />
    <link rel="shortcut icon" href="./logolps.png?v=4" />
    <link rel="apple-touch-icon" href="./logolps.png?v=4" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .stand-shell {
        width: min(760px, 94vw);
        margin: 1.2rem auto 2rem;
      }
      .stand-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 1rem;
      }
      .stand-title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 0.9rem;
      }
      .stand-title-row h1 {
        font-size: clamp(1.55rem, 4.5vw, 2.1rem);
        margin: 0;
      }
      .stand-kicker {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .stand-actions {
        margin: 0.4rem 0 1rem;
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .stand-table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 0.7rem;
        background: #fff;
      }
      .stand-table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }
      .stand-table th,
      .stand-table td {
        text-align: left;
        padding: 0.55rem 0.6rem;
        border-bottom: 1px solid var(--line-soft);
        font-size: 0.9rem;
      }
      .stand-table th {
        background: var(--line-soft);
        font-size: 0.8rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .stand-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .stand-grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.75rem;
      }
      .stand-summary {
        margin-top: 0.8rem;
        border: 1px solid var(--line);
        border-radius: 0.7rem;
        background: var(--line-soft);
        padding: 0.7rem 0.8rem;
        display: grid;
        gap: 0.35rem;
      }
      .stand-summary-line {
        display: flex;
        justify-content: space-between;
        gap: 0.8rem;
        font-size: 0.94rem;
      }
      .stand-summary-line strong {
        font-size: 1.02rem;
      }
      .stand-modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(20, 14, 10, 0.55);
        z-index: 120;
        padding: 1rem;
      }
      .stand-modal-backdrop.is-open {
        display: flex;
      }
      .stand-modal {
        
        max-height: 92vh;
        overflow: auto;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 1rem;
      }
      .stand-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 0.8rem;
      }
      .stand-modal-header h2 {
        margin: 0;
      }
      .stand-modal-close {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 999px;
        width: 2rem;
        height: 2rem;
        font-size: 1.2rem;
        cursor: pointer;
      }
      @media (max-width: 700px) {
        .stand-grid-2,
        .stand-grid-3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="stand-shell">
      <section class="stand-card">
        <div class="stand-title-row">
          <div>
            <p class="stand-kicker">Mode stand</p>
            <h1>Dashboard commandes</h1>
          </div>
        </div>
        <div class="stand-actions">
          <button class="btn btn-primary" id="open-stand-modal" type="button">Nouvelle fiche</button>
          <button class="btn btn-outline" id="reload-stand-orders" type="button">Rafraîchir la liste</button>
          <button class="btn btn-outline" id="stand-clear-dashboard-session" type="button">Quitter session tableau</button>
        </div>
        <div class="stand-table-wrap">
          <table class="stand-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Email</th>
                <th>Remise</th>
                <th>Total</th>
                <th>Reste dû</th>
                <th>Réf POS</th>
              </tr>
            </thead>
            <tbody id="stand-orders-body">
              <tr>
                <td colspan="7">Chargement...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="form-note" id="stand-dashboard-feedback"></p>
      </section>
    </main>
    <section id="stand-modal-backdrop" class="stand-modal-backdrop" aria-hidden="true">
      <div class="stand-modal" role="dialog" aria-modal="true" aria-labelledby="stand-modal-title">
        <div class="stand-modal-header">
          <h2 id="stand-modal-title">Nouvelle fiche commande</h2>
          <button class="stand-modal-close" id="close-stand-modal" type="button" aria-label="Fermer">×</button>
        </div>
        <form id="stand-form" class="order-form" novalidate>
          <div class="stand-grid-2">
            <div class="form-row">
              <label for="customer-name">Nom client <span class="required" aria-hidden="true">*</span></label>
              <input id="customer-name" required autocomplete="name" />
            </div>
            <div class="form-row">
              <label for="customer-email">Email <span class="required" aria-hidden="true">*</span></label>
              <input id="customer-email" type="email" required autocomplete="email" />
            </div>
          </div>
          <div class="stand-grid-2">
            <div class="form-row">
              <label for="customer-phone">Téléphone (optionnel)</label>
              <input id="customer-phone" autocomplete="tel" />
            </div>
            <div class="form-row">
              <label for="pos-reference">Référence ticket POS</label>
              <input id="pos-reference" placeholder="Ex: 25-04-14h32-12.00" />
            </div>
          </div>
          <div class="form-row">
            <label for="order-details">Détails commande <span class="required" aria-hidden="true">*</span></label>
            <textarea id="order-details" rows="4" required></textarea>
          </div>
          <div class="stand-grid-3">
            <div class="form-row">
              <label for="amount-products">Montant produits (€) <span class="required" aria-hidden="true">*</span></label>
              <input id="amount-products" type="number" step="0.01" min="0" required value="0" />
            </div>
            <div class="form-row">
              <label for="delivery-method">Remise</label>
              <select id="delivery-method">
                <option value="pickup">Retrait atelier</option>
                <option value="ship">Livraison</option>
              </select>
            </div>
            <div class="form-row">
              <label for="amount-paid">Montant payé (€)</label>
              <input id="amount-paid" type="number" step="0.01" min="0" value="0" />
            </div>
          </div>
          <div id="shipping-fields" class="stand-grid-3" hidden>
            <div class="form-row">
              <label for="shipping-address1">Rue livraison</label>
              <input id="shipping-address1" />
            </div>
            <div class="form-row">
              <label for="shipping-postal">Code postal livraison</label>
              <input id="shipping-postal" />
            </div>
            <div class="form-row">
              <label for="shipping-city">Ville livraison</label>
              <input id="shipping-city" />
            </div>
          </div>
          <div class="stand-grid-2">
            <div class="form-row">
              <label for="deadline-date">Date cible</label>
              <input id="deadline-date" type="date" />
            </div>
            <div class="form-row">
              <label for="deadline-note">Créneau/remarque délai</label>
              <input id="deadline-note" />
            </div>
          </div>
          <div class="form-row">
            <label for="notes">Notes internes</label>
            <textarea id="notes" rows="3"></textarea>
          </div>
          <div class="stand-summary">
            <div class="stand-summary-line"><span>Sous-total produits</span><span id="sum-products">0,00 €</span></div>
            <div class="stand-summary-line"><span>Livraison</span><span id="sum-shipping">0,00 €</span></div>
            <div class="stand-summary-line"><span>Total commande</span><span id="sum-total">0,00 €</span></div>
            <div class="stand-summary-line"><span>Déjà payé</span><span id="sum-paid">0,00 €</span></div>
            <div class="stand-summary-line"><span>Paiement</span><span id="sum-payment-status">À encaisser plus tard</span></div>
            <div class="stand-summary-line"><strong>Reste dû</strong><strong id="sum-due">0,00 €</strong></div>
          </div>
          <div class="stand-actions">
            <button type="submit" class="btn btn-primary">Enregistrer la commande</button>
            <button type="button" class="btn btn-outline" id="reset-stand-form">Nouvelle fiche vide</button>
          </div>
          <p class="form-note" id="stand-feedback"></p>
        </form>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./components/config.js"></script>
    <script src="./stand.js"></script>
  </body>
</html>
